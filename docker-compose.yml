services:
  db:
    image: pgvector/pgvector:pg16
    container_name: olc-postgres
    environment:
      POSTGRES_USER: olc
      POSTGRES_PASSWORD: olc
      POSTGRES_DB: olc
    ports:
      - "5432:5432"
    volumes:
      - olc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olc -d olc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  olc_pgdata:
